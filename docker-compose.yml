services:
  postgres:
    container_name: postgres
    image: postgres:17.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRE_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_PASSWORD} -U ${POSTGRE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
    - ./postgres-data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    networks:
      - tutor_network

  redis:
    container_name: redis
    image: redis:7.4.2
    restart: unless-stopped
    volumes:
    - ./redis-data:/data
    # ports:
    #   - '6379:6379'
    networks:
      - tutor_network

  minio:
    container_name: minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    volumes:
    - ./minio-data:/data
    # ports:
    #   - '9000:9000'
    #   - '9001:9001'
    networks:
      - tutor_network
    command: server /data --console-address ":9001"

  testing_system:
    container_name: testing_system
    build:
      context: .
      dockerfile: Dockerfile.ts
    restart: unless-stopped
    environment:
      DEBUG: "${TS_DEBUG}"
      TIMEOUT: "${TS_TIMEOUT}"
      HOST: "${TS_HOST}"
      PORT: "${TS_PORT}"
      WORKERS: "${TS_WORKERS}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # ports:
    #   - "8001:8001"
    networks:
      - tutor_network

  celery:
    container_name: celery
    build:
      context: .
      dockerfile: Dockerfile.celery
    restart: unless-stopped
    environment:
      SECRET_KEY: "${BACKEND_SECRET_KEY}"
      DEBUG: "${BACKEND_DEBUG}"
      ALLOWED_HOSTS: "${BACKEND_ALLOWED_HOSTS}"
      ACCESS_TOKEN_LIFETIME: "${BACKEND_ACCESS_TOKEN_LIFETIME}"
      REFRESH_TOKEN_LIFETIME: "${BACKEND_REFRESH_TOKEN_LIFETIME}"
      POSTGRESQL_HOST: "${POSTGRESQL_HOST}"
      POSTGRESQL_PORT: "${POSTGRESQL_PORT}"
      POSTGRESQL_USER: "${POSTGRE_USER}"
      POSTGRESQL_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRESQL_NAME: "${POSTGRES_DB}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_DATABASE: "${BACKEND_REDIS_DATABASE}"
      MINIO_HOST: "${MINIO_HOST}"
      MINIO_PORT: "${MINIO_PORT}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      TS_HOST: "${TS_HOST}"
      TS_PORT: "${TS_PORT}"
      CELERY_BROKER_DATABASE: "${CELERY_BROKER_DATABASE}"
    depends_on:
      - redis
      - postgres
    networks:
      - tutor_network
  
  backend:
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      HOST: "${BACKEND_HOST}"
      PORT: "${BACKEND_PORT}"
      SECRET_KEY: "${BACKEND_SECRET_KEY}"
      DEBUG: "${BACKEND_DEBUG}"
      ALLOWED_HOSTS: "${BACKEND_ALLOWED_HOSTS}"
      ACCESS_TOKEN_LIFETIME: "${BACKEND_ACCESS_TOKEN_LIFETIME}"
      REFRESH_TOKEN_LIFETIME: "${BACKEND_REFRESH_TOKEN_LIFETIME}"
      POSTGRESQL_HOST: "${POSTGRESQL_HOST}"
      POSTGRESQL_PORT: "${POSTGRESQL_PORT}"
      POSTGRESQL_USER: "${POSTGRE_USER}"
      POSTGRESQL_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRESQL_NAME: "${POSTGRES_DB}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
      REDIS_DATABASE: "${BACKEND_REDIS_DATABASE}"
      MINIO_HOST: "${MINIO_HOST}"
      MINIO_PORT: "${MINIO_PORT}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      TS_HOST: "${TS_HOST}"
      TS_PORT: "${TS_PORT}"
      CELERY_BROKER_DATABASE: "${CELERY_BROKER_DATABASE}"
    depends_on:
      - redis
      - postgres
      - minio
      - testing_system
      - celery
    networks:
      - tutor_network
    # ports:
    #   - "8000:8000"

  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tutor_network

networks:
  tutor_network:
    driver: bridge